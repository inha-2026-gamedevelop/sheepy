name: 게임 버그 리포트
description: 게임 내에서 발생하는 버그나 오류를 제보합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해 주셔서 감사합니다. 문제를 빠르게 파악하기 위해 아래 양식을 채워주세요.
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 게임 내에서 발생한 버그에 대해 명확하게 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 씬(Scene) 이름, 특정 조작 순서 등 버그를 재현할 수 있는 단계를 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 예상되는 동작
      description: 기획상 의도되거나 예상했던 정상적인 동작을 설명해 주세요.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 타겟 플랫폼
      description: 버그가 발생한 플랫폼을 선택해 주세요.
      options:
        - Unity Editor (Play Mode)
        - Windows (Standalone)
        - Mac (Standalone)
        - Android
        - iOS
        - WebGL
        - 기타
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 환경 정보
      description: 사용 중인 유니티 버전(예: 2022.3.10f1), 기기 모델, OS 버전 등을 입력해 주세요.
    validations:
      required: true
