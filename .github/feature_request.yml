name: 신규 기획/기능 제안
description: 게임에 추가할 새로운 기능이나 시스템, 에셋을 제안합니다.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: concept
    attributes:
      label: 제안 개요
      description: 추가되기를 원하는 기능이나 시스템의 핵심 컨셉을 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 필요성 및 기대 효과
      description: 이 기능이 게임 플레이나 개발 과정에 어떤 긍정적인 영향을 미치는지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: 참고 자료 (선택)
      description: 레퍼런스가 되는 타겟 게임, 이미지, 기획 문서 링크 등이 있다면 첨부해 주세요.
    validations:
      required: false
